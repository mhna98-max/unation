<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스토어 — UNATION</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="assets/style.css">
<style>
  .store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;margin-top:24px;}
  .product-card{background:var(--card,rgba(255,255,255,.03));border:1px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;}
  .product-img{width:100%;aspect-ratio:1/1;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;font-size:40px;color:rgba(255,255,255,.2);overflow:hidden;}
  .product-img img{width:100%;height:100%;object-fit:cover;}
  .product-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .product-name{font-family:var(--font-h);font-weight:700;font-size:15px;}
  .product-desc{font-size:12.5px;color:var(--dim2);line-height:1.5;flex:1;}
  .product-price{font-family:var(--font-m);font-weight:700;color:var(--cyan);font-size:15px;}
  .product-stock{font-size:11.5px;color:var(--dim2);}
  .checkout-modal-backdrop{position:fixed;inset:0;background:rgba(8,7,15,.7);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;}
  .checkout-modal-backdrop.open{display:flex;}
  .checkout-modal{background:var(--bg-2,#13111c);border:1px solid var(--border);border-radius:18px;padding:26px;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;}
</style>
</head>
<body>
<div class="aurora-bg" aria-hidden="true"><span class="blob blob-1"></span><span class="blob blob-2"></span><span class="blob blob-3"></span></div>
<div class="nav-wrap">
  <nav class="nav">
    <a href="index.html" class="logo">
      <svg class="logo-mark" viewBox="0 0 32 32" width="28" height="28"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#06b6d4"/></linearGradient></defs><rect width="32" height="32" rx="9" fill="url(#lg)"/><text x="16" y="22" font-family="Space Grotesk,sans-serif" font-weight="700" font-size="16" fill="#fff" text-anchor="middle">U</text></svg>
      UNATION
    </a>
    <div class="nav-actions">
      <a id="back-btn" href="creator.html" class="btn btn-outline btn-sm">← 돌아가기</a>
    </div>
  </nav>
</div>

<div class="mock-banner">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex-shrink:0;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  <span><strong>테스트(모의) 결제</strong> — 실제 금액이 청구되지 않습니다</span>
</div>

<main>
<div class="container" style="padding:32px 20px 80px;max-width:1000px;">
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:6px;">
    <span class="avatar" style="width:44px;height:44px;font-size:18px;" id="store-avatar">?</span>
    <div>
      <h1 style="font-family:var(--font-h);font-weight:700;font-size:21px;" id="store-title">스토어</h1>
      <p class="text-dim2" style="font-size:13px;" id="store-sub">크리에이터의 굿즈를 구경해보세요</p>
    </div>
  </div>

  <div id="store-empty" class="text-dim2" style="display:none;margin-top:32px;text-align:center;padding:40px;">판매 중인 상품이 아직 없어요.</div>
  <div id="store-grid" class="store-grid"></div>
</div>
</main>

<!-- 구매 모달 -->
<div class="checkout-modal-backdrop" id="checkout-backdrop">
  <div class="checkout-modal">
    <h3 style="font-family:var(--font-h);font-weight:700;font-size:17px;margin-bottom:4px;" id="co-name">상품명</h3>
    <p class="text-dim2" style="font-size:13px;margin-bottom:18px;" id="co-price">가격</p>

    <div id="co-error" class="field-error" style="display:none;margin-bottom:12px;"></div>

    <div class="field">
      <label class="field-label" for="co-nickname">닉네임 <span class="field-hint">최대 20자</span></label>
      <input class="field-input" id="co-nickname" type="text" placeholder="익명의 시민" maxlength="20">
    </div>
    <div class="field">
      <label class="field-label" for="co-contact">연락처 <span class="field-hint">상품 전달용 이메일 또는 전화번호</span></label>
      <input class="field-input" id="co-contact" type="text" placeholder="email@example.com">
    </div>
    <div class="field">
      <label class="field-label" for="co-qty">수량</label>
      <input class="field-input" id="co-qty" type="number" min="1" value="1" style="max-width:120px;">
    </div>
    <div class="field">
      <label class="field-label" for="co-message">메시지 <span class="field-hint">선택</span></label>
      <textarea class="field-input field-textarea" id="co-message" rows="2" maxlength="150" placeholder="크리에이터에게 전할 메시지"></textarea>
    </div>
    <div class="field">
      <label class="field-label">결제 수단</label>
      <div class="donation-type-row">
        <label class="dtype-chip active"><input type="radio" name="co-pm" value="card" checked><span>💳 카드</span></label>
        <label class="dtype-chip"><input type="radio" name="co-pm" value="kakaopay"><span>🟡 카카오페이</span></label>
        <label class="dtype-chip"><input type="radio" name="co-pm" value="tosspay"><span>🔵 토스페이</span></label>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:18px;">
      <button class="btn btn-outline" id="co-cancel" style="flex:1;">취소</button>
      <button class="btn btn-primary" id="co-submit" style="flex:2;">구매하기</button>
    </div>
  </div>
</div>

<script src="assets/script.js"></script>
<script>
(async () => {
  const handle = new URLSearchParams(location.search).get('handle');
  if (!handle) {
    document.getElementById('store-title').textContent = '핸들이 필요해요';
    document.getElementById('store-sub').textContent = '주소에 ?handle=핸들 을 붙여주세요.';
    return;
  }
  document.getElementById('back-btn').href = `creator.html?handle=${encodeURIComponent(handle)}`;

  let products = [];
  try {
    const data = await apiFetch(`/api/creators/${handle}/products`);
    products = data.products || [];
    document.getElementById('store-avatar').textContent = (data.creatorDisplayName || handle)[0];
    document.getElementById('store-title').textContent = `${data.creatorDisplayName || handle}의 스토어`;
  } catch (e) {
    document.getElementById('store-title').textContent = '크리에이터를 찾을 수 없어요';
    document.getElementById('store-sub').textContent = '';
    return;
  }

  const grid = document.getElementById('store-grid');
  if (!products.length) {
    document.getElementById('store-empty').style.display = '';
  } else {
    grid.innerHTML = products.map(p => `
      <div class="product-card">
        <div class="product-img">${p.imageUrl ? `<img src="${escapeHtml(p.imageUrl)}" alt="${escapeHtml(p.name)}">` : '🎁'}</div>
        <div class="product-body">
          <div class="product-name">${escapeHtml(p.name)}</div>
          <div class="product-desc">${escapeHtml(p.description || '')}</div>
          <div class="product-price">${formatWon(p.price)}</div>
          <div class="product-stock">${p.stock === null ? '재고 무제한' : (p.stock > 0 ? `재고 ${p.stock}개 남음` : '품절')}</div>
          <button class="btn btn-primary btn-sm" data-id="${p.id}" ${p.stock === 0 ? 'disabled' : ''} style="margin-top:6px;">
            ${p.stock === 0 ? '품절' : '구매하기'}
          </button>
        </div>
      </div>`).join('');
  }

  // ── 구매 모달 ──
  const backdrop = document.getElementById('checkout-backdrop');
  let activeProduct = null;

  function openCheckout(product) {
    activeProduct = product;
    document.getElementById('co-name').textContent = product.name;
    document.getElementById('co-price').textContent = `${formatWon(product.price)} / 개`;
    document.getElementById('co-qty').max = product.stock === null ? 20 : product.stock;
    document.getElementById('co-error').style.display = 'none';
    backdrop.classList.add('open');
  }
  function closeCheckout() { backdrop.classList.remove('open'); activeProduct = null; }

  grid.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-id]');
    if (!btn) return;
    const product = products.find(p => p.id === parseInt(btn.dataset.id, 10));
    if (product) openCheckout(product);
  });
  document.getElementById('co-cancel').addEventListener('click', closeCheckout);
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeCheckout(); });

  document.getElementById('co-submit').addEventListener('click', async () => {
    if (!activeProduct) return;
    const errEl = document.getElementById('co-error');
    errEl.style.display = 'none';
    const btn = document.getElementById('co-submit');
    btn.disabled = true; btn.textContent = '처리 중…';
    try {
      const { order } = await apiFetch('/api/orders', {
        method: 'POST',
        body: {
          productId: activeProduct.id,
          buyerNickname: document.getElementById('co-nickname').value.trim(),
          buyerContact: document.getElementById('co-contact').value.trim(),
          quantity: parseInt(document.getElementById('co-qty').value, 10) || 1,
          message: document.getElementById('co-message').value.trim(),
          paymentMethod: document.querySelector('input[name="co-pm"]:checked').value,
        }
      });
      showToast(`구매가 완료됐어요! (${formatWon(order.amount)})`);
      closeCheckout();
      location.reload();
    } catch (e) {
      errEl.textContent = e.message; errEl.style.display = '';
    }
    btn.disabled = false; btn.textContent = '구매하기';
  });
})();
</script>
</body>
</html>
