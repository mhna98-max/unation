# ============================================================
# unation.nginx.conf — Nginx 리버스 프록시 설정 템플릿
#
# 역할:
#  - 80/443 포트(웹 표준 포트)로 들어온 요청을 내부 3000번 포트의
#    Node 서버로 전달합니다. 도메인 연결과 HTTPS(SSL)는 보통 Node가
#    아니라 이렇게 앞단의 Nginx가 처리하는 게 표준적인 구성입니다.
#  - SSE(실시간 후원 알림)가 끊기지 않도록 관련 설정이 포함되어 있습니다.
#
# 설치 방법 (deployment-guide.md 4단계 참고):
#   1. yourdomain.com 부분을 실제 보유한 도메인으로 전부 교체
#   2. sudo cp unation.nginx.conf /etc/nginx/sites-available/unation
#   3. sudo ln -s /etc/nginx/sites-available/unation /etc/nginx/sites-enabled/
#   4. sudo nginx -t                 (설정 문법 검사)
#   5. sudo systemctl reload nginx
#   6. sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#      (Let's Encrypt 무료 SSL 인증서를 자동 발급 + 위 설정을 자동으로
#       HTTPS용으로 보강해줍니다. certbot이 없다면: sudo apt install certbot python3-certbot-nginx)
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE(실시간 후원 알림, /api/stream)가 버퍼링 없이 즉시 전달되도록 함
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;

        # SSE 연결은 오래 유지되므로 타임아웃을 넉넉하게
        proxy_read_timeout 1h;
    }

    client_max_body_size 5m;
}
